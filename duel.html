<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel a Friend | GeoRanks</title>
  <link rel="icon" href="assets/favicon1.png" type="image/png">

  <!-- Primary Meta Tags -->
  <meta name="title" content="GeoRanks - Challenge a Friend">
  <meta name="description" content="Challenge a friend to a head-to-head geography duel on GeoRanks!">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://geo-ranks.com/duel.html">
  <meta property="og:title" content="GeoRanks - Challenge a Friend">
  <meta property="og:description" content="Challenge a friend to a head-to-head geography duel on GeoRanks!">
  <meta property="og:image" content="https://geo-ranks.com/assets/preview1.jpg">
  <meta property="og:site_name" content="GeoRanks">

  <!-- Plausible -->
  <script async src="https://plausible.io/js/pa-tUa77bKcZgPbREKVwm36y.js"></script>
  <script>
    window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments); };
    plausible.init = plausible.init || function (i) { plausible.o = i || {}; };
    plausible.init();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/page.css" />

  <style>
    body { padding-top: 80px; }

    /* ── Loading overlay ── */
    #pageLoadingOverlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #b4f3e9 0%, #38bdf8 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000; color: #0d315a;
    }
    #pageLoadingOverlay h2 { font-size: 1.4rem; margin-bottom: 1rem; }
    .spinner {
      width: 50px; height: 50px;
      border: 5px solid rgba(255,255,255,0.3); border-top-color: #0d315a;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main card ── */
    .duel-container {
      max-width: 560px; margin: 2rem auto; padding: 0 1rem;
    }
    .duel-card {
      background: white; border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      padding: 2.5rem 2rem;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .duel-header {
      text-align: center; margin-bottom: 2rem;
    }
    .duel-header h1 {
      font-size: 2rem; font-weight: 700; color: #0d315a;
    }
    .duel-header p {
      color: #6b7280; font-size: 0.95rem; margin-top: 0.4rem;
    }

    /* ── Category grid ── */
    .category-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;
      max-height: 360px; overflow-y: auto; margin-bottom: 1.5rem;
      padding-right: 4px;
    }
    .cat-btn {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem; border: 2px solid #e5e7eb;
      border-radius: 12px; background: #f9fafb;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      font-size: 0.85rem; font-weight: 500; color: #374151;
      transition: all 0.15s ease; text-align: left;
    }
    .cat-btn:hover { border-color: #38bdf8; background: #f0fffe; }
    .cat-btn.selected {
      border-color: #0d315a; background: #e0f2fe; color: #0d315a; font-weight: 700;
    }
    .cat-btn.locked {
      opacity: 0.42;
      cursor: not-allowed;
    }
    .cat-btn.locked:hover {
      border-color: #e5e7eb;
      background: #f9fafb;
    }
    .cat-lock {
      margin-left: auto;
      font-size: 0.72rem;
      flex-shrink: 0;
    }
    .cat-separator {
      grid-column: 1 / -1;
      padding: 0.3rem 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cat-separator.locked { color: #d1d5db; }
    .cat-emoji { font-size: 1.3rem; flex-shrink: 0; }

    /* ── Mode selector ── */
    .mode-grid {
      display: flex; flex-direction: column; gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .mode-btn {
      display: flex; align-items: flex-start; gap: 0.9rem;
      padding: 1rem 1.1rem; border: 2px solid #e5e7eb;
      border-radius: 14px; background: #f9fafb;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      text-align: left; transition: all 0.15s ease; width: 100%;
    }
    .mode-btn:hover { border-color: #38bdf8; background: #f0fffe; }
    .mode-btn.selected {
      border-color: #0d315a; background: #e0f2fe; color: #0d315a;
    }
    .mode-btn .mode-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1.2; }
    .mode-btn .mode-info { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn .mode-name { font-size: 0.95rem; font-weight: 700; color: #0d315a; }
    .mode-btn .mode-desc { font-size: 0.78rem; color: #6b7280; line-height: 1.4; }
    .mode-btn.selected .mode-name { color: #0d315a; }
    .mode-btn.selected .mode-desc { color: #0369a1; }
    .btn-back {
      width: 100%; padding: 0.75rem; font-size: 0.95rem; font-weight: 600;
      background: #f3f4f6; color: #374151; border: none; border-radius: 12px;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      transition: background 0.15s ease; margin-bottom: 0.75rem;
    }
    .btn-back:hover { background: #e5e7eb; }

    /* ── Create button ── */
    .btn-create {
      width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 700;
      background: #0d315a; color: white; border: none; border-radius: 14px;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn-create:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-create:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Waiting room ── */
    .waiting-section { text-align: center; }
    .waiting-emoji { font-size: 4rem; margin-bottom: 1rem; }
    .waiting-title { font-size: 1.6rem; font-weight: 700; color: #0d315a; margin-bottom: 0.4rem; }
    .waiting-subtitle { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; }

    .category-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border: 2px solid #38bdf8; border-radius: 20px;
      padding: 0.5rem 1.2rem; font-weight: 700; color: #0d315a;
      font-size: 1rem; margin-bottom: 2rem;
    }

    /* Invite link box */
    .invite-box {
      background: #f0fffe; border: 2px dashed #38bdf8; border-radius: 14px;
      padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .invite-label {
      font-size: 0.8rem; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    .invite-url-row {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .invite-url {
      flex: 1; padding: 0.6rem 0.8rem; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 0.78rem; color: #374151; background: white; font-family: monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-copy {
      padding: 0.6rem 1rem; background: #0d315a; color: white; border: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      font-family: 'Poppins', sans-serif; white-space: nowrap;
      transition: opacity 0.15s ease;
    }
    .btn-copy:hover { opacity: 0.85; }
    .btn-copy.copied { background: #059669; }

    /* Pulse animation for waiting indicator */
    .pulse-ring {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(56, 189, 248, 0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      animation: pulse-expand 1.8s ease-out infinite;
    }
    .pulse-ring span { font-size: 2rem; }
    @keyframes pulse-expand {
      0%   { transform: scale(0.9); opacity: 0.6; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    /* Opponent joined state */
    .opponent-joined {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      border: 2px solid #34d399; border-radius: 14px;
      padding: 1.25rem; margin-bottom: 1.5rem; text-align: center;
    }
    .opponent-joined p { font-weight: 700; color: #065f46; font-size: 1rem; }

    /* Countdown */
    .countdown-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #b4f3e9 0%, #38bdf8 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #0d315a;
    }
    .countdown-number {
      font-size: 8rem; font-weight: 700; line-height: 1;
      animation: countPop 0.5s ease;
    }
    .countdown-label { font-size: 1.2rem; font-weight: 600; margin-top: 1rem; opacity: 0.7; }
    @keyframes countPop {
      0%   { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Expired / error states */
    .expired-card {
      text-align: center; padding: 2rem;
    }
    .expired-card h2 { font-size: 1.6rem; color: #0d315a; margin: 1rem 0 0.5rem; }
    .expired-card p { color: #6b7280; margin-bottom: 1.5rem; }

    /* ── Duel landing page ── */
    .landing-header {
      text-align: center; margin-bottom: 1.75rem;
    }
    .landing-header h1 { font-size: 2rem; font-weight: 700; color: #0d315a; }
    .landing-header p  { color: #6b7280; font-size: 0.95rem; margin-top: 0.4rem; }

    /* Two equal primary CTA cards */
    .landing-cta-grid {
      display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 0.5rem;
    }
    .landing-cta-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.2rem 1.25rem; border-radius: 16px;
      border: 2px solid #e5e7eb; background: #f9fafb;
      cursor: pointer; font-family: 'Poppins', sans-serif;
      text-align: left; width: 100%;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }
    .landing-cta-card:hover { border-color: #38bdf8; background: #f0fffe; transform: translateY(-1px); }
    .landing-cta-icon { font-size: 2rem; flex-shrink: 0; line-height: 1; }
    .landing-cta-body { display: flex; flex-direction: column; gap: 3px; }
    .landing-cta-title { font-size: 1rem; font-weight: 700; color: #0d315a; }
    .landing-cta-desc  { font-size: 0.8rem; color: #6b7280; line-height: 1.4; }

    /* Quick Match mode cards (revealed after clicking Quick Match CTA) */
    .qm-mode-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.75rem; margin-top: 0.25rem;
    }
    .qm-mode-header-back {
      background: none; border: none; cursor: pointer; font-size: 1rem;
      color: #6b7280; padding: 0; font-family: 'Poppins', sans-serif;
      font-weight: 600; display: flex; align-items: center; gap: 0.3rem;
      transition: color 0.15s ease;
    }
    .qm-mode-header-back:hover { color: #0d315a; }
    .qm-mode-header-title {
      font-size: 1rem; font-weight: 700; color: #0d315a;
    }
    .qm-mode-cards {
      display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem;
    }
    .qm-mode-card {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.9rem 1rem; border-radius: 14px;
      border: 2px solid #e5e7eb; background: #f9fafb;
      transition: all 0.15s ease; text-align: left; width: 100%;
      font-family: 'Poppins', sans-serif; cursor: pointer;
    }
    .qm-mode-card.active {
      border-color: #0d315a; background: #e0f2fe; cursor: pointer;
    }
    .qm-mode-card.active:hover { opacity: 0.9; transform: translateY(-1px); }
    .qm-mode-card.disabled { opacity: 0.42; cursor: not-allowed; }
    .qm-mode-icon { font-size: 1.6rem; flex-shrink: 0; }
    .qm-mode-name {
      font-size: 0.95rem; font-weight: 700; color: #0d315a;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .qm-mode-desc { font-size: 0.78rem; color: #6b7280; margin-top: 2px; line-height: 1.3; }
    .coming-soon-tag {
      font-size: 0.6rem; font-weight: 700; padding: 1px 6px;
      background: #f3f4f6; color: #9ca3af; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.04em; vertical-align: middle;
    }

    @media (max-width: 480px) {
      .category-grid { grid-template-columns: 1fr; max-height: 280px; }
      .duel-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="pageLoadingOverlay">
  <h2>⚔️ Loading…</h2>
  <div class="spinner"></div>
</div>

<!-- Header -->
<header class="home-glass-header">
  <div class="logo-header">
    <a href="index.html" class="logo-link">
      <img src="assets/logo2.png" alt="GeoRanks Logo" />
    </a>
  </div>
  <div class="hamburger-menu">
    <div class="menu-icon" id="menuToggle">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<!-- Menu overlay -->
<div class="menu-overlay" id="menuOverlay"></div>
<script src="/js/nav-menu-init.js"></script>

<!-- Countdown overlay (hidden until needed) -->
<div class="countdown-overlay" id="countdownOverlay" style="display:none;">
  <div class="countdown-number" id="countdownNumber">3</div>
  <div class="countdown-label">Get ready to rank!</div>
</div>

<!-- Main content -->
<div class="duel-container" id="mainContent" style="display:none;">
  <div class="duel-card" id="duelCard">
    <!-- Content injected by JS -->
  </div>
</div>

<!-- Footer -->
<footer class="home-footer">
  <div class="footer-socials"></div>
</footer>

<!-- Menu toggle -->
<script>
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.add('active');
  });
  document.getElementById('closeMenu').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('active');
  });
  document.getElementById('menuOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('menuOverlay'))
      document.getElementById('menuOverlay').classList.remove('active');
  });
</script>

<!-- Daily Challenge menu button -->
<script type="module">
  import { getTodaysDailyChallenge, modeDisplayNames, categoryDisplayNames, categoryEmojis } from './js/daily-challenge.js';
  document.addEventListener('DOMContentLoaded', () => {
    const span = document.getElementById('dailyChallengeCategory');
    const bg   = document.getElementById('dailyChallengeBg');
    const today = getTodaysDailyChallenge();
    if (today && span && bg) {
      span.textContent = `${modeDisplayNames[today.mode] || today.mode}: ${categoryDisplayNames[today.category] || today.category} ${categoryEmojis[today.category] || ''}`;
      bg.style.backgroundImage = `url('images/categories/${today.category}.jpg')`;
    }
  });
</script>

<!-- Main duel lobby logic -->
<script type="module">
  import { supabase } from './js/supabase-client.js';
  import { categoriesConfig } from './js/categories-config.js';
  import { createDuelChannel } from './js/duel-channel.js';
  import { getUserCapabilities } from './js/permissions.js';

  const MATCH_EXPIRY_MINUTES = 30; // waiting room expires

  const urlParams   = new URLSearchParams(window.location.search);
  const matchIdParam = urlParams.get('match');

  let currentUser   = null;
  let duelChannel   = null;
  let isPlayer1     = false;
  let matchData     = null;

  const overlay   = document.getElementById('pageLoadingOverlay');
  const mainContent = document.getElementById('mainContent');
  const card      = document.getElementById('duelCard');

  // ── Auth guard ──────────────────────────────────────────────────
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.user) {
    window.location.href = 'auth.html?next=' + encodeURIComponent(window.location.href);
    throw new Error('auth required');
  }
  currentUser = session.user;

  // ── Route: waiting room vs. landing page ─────────────────────────
  if (matchIdParam) {
    await loadWaitingRoom(matchIdParam);
  } else {
    const caps = await getUserCapabilities();
    // ?qm=1 is used by the "Play Again" button on the results page to
    // land directly on the Quick Match mode picker rather than the root landing.
    if (urlParams.get('qm') === '1') {
      showQuickMatchModePicker(caps);
    } else {
      showDuelLanding(caps);
    }
  }

  overlay.style.display = 'none';
  mainContent.style.display = 'block';

  // ================================================================
  // DUEL LANDING (default view — two equal CTAs)
  // ================================================================
  function showDuelLanding(caps) {
    card.innerHTML = `
      <div class="landing-header">
        <h1>⚔️ Duel</h1>
        <p>Challenge someone head-to-head in a geography ranking battle</p>
      </div>
      <div class="landing-cta-grid">
        <button class="landing-cta-card" id="quickMatchCta">
          <span class="landing-cta-icon">⚡</span>
          <div class="landing-cta-body">
            <div class="landing-cta-title">Play Quick Match</div>
            <div class="landing-cta-desc">Find an online opponent and play a live 1v1 match.</div>
          </div>
        </button>
        <button class="landing-cta-card" id="inviteFriendCta">
          <span class="landing-cta-icon">📨</span>
          <div class="landing-cta-body">
            <div class="landing-cta-title">Invite a Friend</div>
            <div class="landing-cta-desc">Create a private challenge link to share via WhatsApp, Instagram, or messages.</div>
          </div>
        </button>
      </div>
    `;

    card.querySelector('#quickMatchCta').addEventListener('click', () => {
      showQuickMatchModePicker(caps);
    });

    card.querySelector('#inviteFriendCta').addEventListener('click', () => {
      showCategoryPicker(caps);
    });
  }

  // ================================================================
  // QUICK MATCH MODE PICKER (revealed after clicking Quick Match CTA)
  // ================================================================
  function showQuickMatchModePicker(caps) {
    card.innerHTML = `
      <div class="qm-mode-header">
        <button class="qm-mode-header-back" id="qmBackBtn">← Back</button>
        <span class="qm-mode-header-title">⚡ Quick Match</span>
      </div>
      <div class="qm-mode-cards">
        <button class="qm-mode-card active" id="qmClassicBtn">
          <span class="qm-mode-icon">⚔️</span>
          <div>
            <div class="qm-mode-name">Classic</div>
            <div class="qm-mode-desc">Rank 10 countries · matched with a random opponent instantly</div>
          </div>
        </button>
        <button class="qm-mode-card active" id="qmTop10Btn">
          <span class="qm-mode-icon">📋</span>
          <div>
            <div class="qm-mode-name">Top 10</div>
            <div class="qm-mode-desc">Type the top 10 countries in 2 minutes.</div>
          </div>
        </button>
        <button class="qm-mode-card active" id="qmVsBtn">
          <span class="qm-mode-icon">🆚</span>
          <div>
            <div class="qm-mode-name">Versus</div>
            <div class="qm-mode-desc">Go round-for-round in live elimination mode.</div>
          </div>
        </button>
      </div>
    `;

    card.querySelector('#qmBackBtn').addEventListener('click', () => {
      showDuelLanding(caps);
    });

    card.querySelector('#qmClassicBtn').addEventListener('click', () => {
      window.location.href = 'quickmatch.html?mode=classic';
    });

    card.querySelector('#qmTop10Btn').addEventListener('click', () => {
      window.location.href = 'quickmatch.html?mode=top10';
    });

    card.querySelector('#qmVsBtn').addEventListener('click', () => {
      window.location.href = 'quickmatch.html?mode=vs';
    });
  }

  // ================================================================
  // CATEGORY PICKER (no ?match= param)
  // ================================================================
  function showCategoryPicker(caps) {
    const allKeys = Object.keys(categoriesConfig).filter(k =>
      !['rainfall', 'hightemp', 'precipitation'].includes(k)
    );

    // Separate by tier — authoritative source is categoriesConfig[k].tier
    const freeCats    = allKeys.filter(k => categoriesConfig[k].tier === 'free');
    const lightCats   = allKeys.filter(k => categoriesConfig[k].tier === 'light');
    const premiumCats = allKeys.filter(k => categoriesConfig[k].tier === 'premium');

    // Host entitlement from permissions.js — no duplicated category arrays
    const canHostLight   = caps.canAccessLightCategories;
    const canHostPremium = caps.canAccessPremiumCategories;

    // Pre-select from ?category= param (rematch links), validating host entitlement
    const preselect     = new URLSearchParams(window.location.search).get('category');
    const preselectTier = preselect ? (categoriesConfig[preselect]?.tier ?? null) : null;
    const preselectOk   = !!preselectTier && (
      preselectTier === 'free' ||
      (preselectTier === 'light'   && canHostLight)   ||
      (preselectTier === 'premium' && canHostPremium)
    );
    let selectedCategory = (preselect && categoriesConfig[preselect] && preselectOk)
      ? preselect
      : freeCats[0];

    card.innerHTML = `
      <div class="qm-mode-header">
        <button class="qm-mode-header-back" id="backToLandingBtn">← Back</button>
      </div>
      <div class="duel-header">
        <h1>⚔️ Duel a Friend</h1>
        <p>Pick a category, share the link, and race your friend head-to-head</p>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
      <button class="btn-create" id="nextBtn">Next: Choose Mode →</button>
    `;

    card.querySelector('#backToLandingBtn').addEventListener('click', () => {
      showDuelLanding(caps);
    });

    const grid = card.querySelector('#categoryGrid');

    function addSeparator(label, isLocked) {
      const sep = document.createElement('div');
      sep.className = 'cat-separator' + (isLocked ? ' locked' : '');
      sep.textContent = label;
      grid.appendChild(sep);
    }

    function buildSection(keys, isLocked) {
      keys.forEach(key => {
        const cfg = categoriesConfig[key];
        const btn = document.createElement('button');
        btn.dataset.key = key;

        if (isLocked) {
          btn.className = 'cat-btn locked';
          btn.disabled = true;
          btn.innerHTML = `<span class="cat-emoji">${cfg.emoji}</span><span>${cfg.title}</span><span class="cat-lock">🔒</span>`;
        } else {
          btn.className = 'cat-btn' + (key === selectedCategory ? ' selected' : '');
          btn.innerHTML = `<span class="cat-emoji">${cfg.emoji}</span><span>${cfg.title}</span>`;
          btn.addEventListener('click', () => {
            selectedCategory = key;
            grid.querySelectorAll('.cat-btn:not(.locked)').forEach(b =>
              b.classList.toggle('selected', b.dataset.key === key)
            );
          });
        }
        grid.appendChild(btn);
      });
    }

    // Free section — always unlocked for any authenticated user
    buildSection(freeCats, false);

    // Light section — rendered only when light categories exist (future)
    if (lightCats.length > 0) {
      addSeparator(
        canHostLight ? '✨ Light Categories' : '🔒 Light — Upgrade to Host',
        !canHostLight
      );
      buildSection(lightCats, !canHostLight);
    }

    // Premium section
    addSeparator(
      canHostPremium ? '⭐ Premium Categories' : '🔒 Premium — Upgrade to Host',
      !canHostPremium
    );
    buildSection(premiumCats, !canHostPremium);

    card.querySelector('#nextBtn').addEventListener('click', () => {
      showModePicker(selectedCategory, caps);
    });
  }

  // ================================================================
  // MODE PICKER (step 2 of create flow)
  // ================================================================
  function showModePicker(category, caps) {
    const cfg = categoriesConfig[category];

    // Pre-select mode from ?duel_mode= rematch param
    const preselectMode = new URLSearchParams(window.location.search).get('duel_mode');
    let selectedMode = ['classic', 'vs', 'top10'].includes(preselectMode) ? preselectMode : 'classic';

    const modes = [
      {
        key: 'classic',
        icon: '⚔️',
        name: 'Classic',
        desc: 'Rank 10 countries in the correct order — place them all to win'
      },
      {
        key: 'vs',
        icon: '🆚',
        name: 'VS Mode',
        desc: 'Pick the higher-ranked country in each pair — 3 lives, 2 minutes'
      },
      {
        key: 'top10',
        icon: '📋',
        name: 'Top 10',
        desc: 'Type the top 10 countries — name as many as you can in 2 minutes'
      }
    ];

    card.innerHTML = `
      <div class="duel-header">
        <h1>Choose Game Mode</h1>
        <p>Category: <strong>${cfg?.emoji || ''} ${cfg?.title || category}</strong></p>
      </div>
      <div class="mode-grid" id="modeGrid"></div>
      <button class="btn-back" id="backBtn">← Back to Categories</button>
      <button class="btn-create" id="createBtn">Create Challenge</button>
    `;

    const modeGrid = card.querySelector('#modeGrid');
    modes.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (m.key === selectedMode ? ' selected' : '');
      btn.dataset.mode = m.key;
      btn.innerHTML = `
        <span class="mode-icon">${m.icon}</span>
        <span class="mode-info">
          <span class="mode-name">${m.name}</span>
          <span class="mode-desc">${m.desc}</span>
        </span>
      `;
      btn.addEventListener('click', () => {
        selectedMode = m.key;
        modeGrid.querySelectorAll('.mode-btn').forEach(b =>
          b.classList.toggle('selected', b.dataset.mode === m.key)
        );
      });
      modeGrid.appendChild(btn);
    });

    card.querySelector('#backBtn').addEventListener('click', () => {
      showCategoryPicker(caps);
    });

    card.querySelector('#createBtn').addEventListener('click', async () => {
      const btn = card.querySelector('#createBtn');
      btn.disabled = true;
      btn.textContent = 'Creating…';

      const seed = Number(crypto.getRandomValues(new Uint32Array(1))[0]);
      const { data: match, error } = await supabase.rpc('create_duel_match', {
        p_category:  category,
        p_seed:      seed,
        p_duel_mode: selectedMode
      });

      if (error || !match) {
        btn.disabled = false;
        btn.textContent = 'Create Challenge';
        alert('Could not create match. Please try again.');
        return;
      }

      window.location.href = `duel.html?match=${match.id}`;
    });
  }

  // ================================================================
  // WAITING ROOM (?match= present)
  // ================================================================
  async function loadWaitingRoom(matchId) {
    const { data: match, error } = await supabase
      .from('h2h_matches')
      .select('*')
      .eq('id', matchId)
      .maybeSingle();   // .single() throws 406 on zero rows; .maybeSingle() returns null

    if (error) {
      console.error('h2h_matches fetch error:', error);
      showExpired('Could not load challenge. Please check your connection and try again.');
      return;
    }
    if (!match) {
      showExpired('Challenge not found. The link may be invalid or expired.');
      return;
    }

    // Expired waiting room
    const ageMinutes = (Date.now() - new Date(match.created_at)) / 60000;
    if (match.status === 'waiting' && ageMinutes > MATCH_EXPIRY_MINUTES) {
      await supabase.from('h2h_matches').update({ status: 'abandoned' }).eq('id', matchId);
      showExpired('This challenge link has expired (30 min limit).');
      return;
    }

    // Match already finished
    if (match.status === 'finished' || match.status === 'abandoned') {
      window.location.href = `duelresults.html?match=${matchId}`;
      return;
    }

    matchData = match;
    isPlayer1 = match.player1_id === currentUser.id;

    // If this user is neither player yet → join as player2
    if (!isPlayer1 && match.player2_id === null) {
      const { error: joinErr } = await supabase
        .from('h2h_matches')
        .update({ player2_id: currentUser.id, status: 'active' })
        .eq('id', matchId)
        .is('player2_id', null);

      if (joinErr) {
        showExpired('Could not join match — it may have already started.');
        return;
      }
      matchData.player2_id = currentUser.id;
      matchData.status     = 'active';
    }

    // If already active and this user belongs to it, go straight to game
    if (match.status === 'active' && match.started_at &&
        (match.player1_id === currentUser.id || match.player2_id === currentUser.id)) {
      navigateToGame(match);
      return;
    }

    // Render waiting UI
    renderWaitingRoom(matchId);

    // Subscribe to channel
    duelChannel = createDuelChannel(supabase, matchId, currentUser.id, {
      onBothReady:        handleBothReady,
      onGameStart:        handleGameStart,
      onOpponentFinished: () => {} // not needed in lobby
    }, {
      // participant IDs are authoritative from the DB fetch in loadWaitingRoom
      participantIds: [matchData.player1_id, matchData.player2_id]
    });
  }

  function renderWaitingRoom(matchId) {
    const cfg = categoriesConfig[matchData.category];
    const inviteUrl = `${window.location.origin}/duel.html?match=${matchId}`;
    const isWaiting = matchData.status === 'waiting' || matchData.player2_id === null;
    const modeLabelMap = { classic: '⚔️ Classic', vs: '🆚 VS Mode', top10: '📋 Top 10' };
    const modeLabel = modeLabelMap[matchData.duel_mode] || '⚔️ Classic';

    card.innerHTML = `
      <div class="waiting-section">
        <div class="waiting-title">⚔️ Challenge Created!</div>
        <div class="waiting-subtitle">Category: <strong>${cfg?.title || matchData.category}</strong> · ${modeLabel}</div>
        <div class="category-badge">${cfg?.emoji || '🌍'} ${cfg?.title || matchData.category}</div>

        ${isWaiting ? `
        <div class="invite-box">
          <div class="invite-label">Share this link with your opponent</div>
          <div class="invite-url-row">
            <input class="invite-url" id="inviteUrlInput" value="${inviteUrl}" readonly />
            <button class="btn-copy" id="copyBtn">Copy</button>
          </div>
        </div>
        <div class="pulse-ring"><span>⏳</span></div>
        <p style="color:#6b7280;font-size:0.9rem;">Waiting for your opponent to join…</p>
        ` : `
        <div class="opponent-joined">
          <p>✅ Opponent joined! Starting soon…</p>
        </div>
        `}
      </div>
    `;

    if (isWaiting) {
      card.querySelector('#copyBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText(inviteUrl).then(() => {
          const btn = card.querySelector('#copyBtn');
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        });
      });
    }
  }

  async function handleBothReady() {
    if (!isPlayer1) return; // only player1 drives game start

    // Delegate the entire lifecycle transition to the server.
    // start_duel_match validates caller, opponent presence, and match state,
    // writes started_at/timeout_at from the DB server clock, and is idempotent
    // (returns existing timestamps if the match was already started).
    const { data: result, error } = await supabase.rpc('start_duel_match', {
      p_match_id: matchIdParam
    });

    if (error) {
      console.error('⚔️ start_duel_match RPC error:', error.message);
      return;
    }

    // Broadcast the authoritative DB-clock timestamp to both players
    duelChannel.emitGameStart(result.started_at);
    handleGameStart({ started_at: result.started_at });
  }

  function handleGameStart({ started_at }) {
    if (!matchData) return;
    sessionStorage.setItem('duelMatch', JSON.stringify({
      matchId:   matchIdParam,
      seed:      matchData.seed,
      startedAt: started_at,
      duelMode:  matchData.duel_mode || 'classic'
    }));
    runCountdownThenNavigate(started_at, matchData.category, matchData.duel_mode || 'classic');
  }

  function gamePageUrl(category, duelMode) {
    const enc = encodeURIComponent(category);
    if (duelMode === 'vs')    return `duelgame-vs.html?mode=${enc}`;
    if (duelMode === 'top10') return `duelgame-top10.html?mode=${enc}`;
    return `duelgame.html?mode=${enc}`;
  }

  function runCountdownThenNavigate(startedAtISO, category, duelMode) {
    const startedAt    = new Date(startedAtISO).getTime();
    const countdownEnd = startedAt + 3000; // 3 second countdown
    const overlay      = document.getElementById('countdownOverlay');
    const numEl        = document.getElementById('countdownNumber');

    overlay.style.display = 'flex';
    mainContent.style.display = 'none';

    function tick() {
      const remaining = Math.ceil((countdownEnd - Date.now()) / 1000);
      if (remaining <= 0) {
        window.location.href = gamePageUrl(category, duelMode);
        return;
      }
      numEl.textContent = remaining;
      // Re-trigger CSS animation
      numEl.style.animation = 'none';
      numEl.offsetHeight; // reflow
      numEl.style.animation = '';
      setTimeout(tick, Math.min(remaining * 1000 - (Date.now() - startedAt - 3000 + remaining * 1000), 1000));
    }
    tick();
  }

  function showExpired(message) {
    card.innerHTML = `
      <div class="expired-card">
        <div style="font-size:3rem;">⏰</div>
        <h2>Challenge Expired</h2>
        <p>${message}</p>
        <button class="btn-create" onclick="window.location.href='duel.html'">Create New Challenge</button>
      </div>
    `;
    overlay.style.display = 'none';
    mainContent.style.display = 'block';
  }

  function navigateToGame(match) {
    sessionStorage.setItem('duelMatch', JSON.stringify({
      matchId:   match.id,
      seed:      match.seed,
      startedAt: match.started_at,
      duelMode:  match.duel_mode || 'classic'
    }));
    window.location.href = gamePageUrl(match.category, match.duel_mode || 'classic');
  }
</script>

<!-- Auth/premium menu buttons -->
<script type="module">
  import { getUserCapabilities } from './js/permissions.js';
  const caps = await getUserCapabilities();
  if (!caps.isAuthenticated) {
    document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
  } else if (caps.canAccessPremiumCategories) {
    document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
  } else {
    document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
  }
</script>

<script type="module" src="js/identity-gate.js"></script>
</body>
