  <style>

<body>

</button>
    <button class="menu-btn" onclick="window.location.href='index.html'">🏠 Home</button>

<!-- Plain script: remove overlay for free modes immediately — no network deps -->
<script>
  (function() {
    const PREMIUM_MODES = [
      'coastline', 'cuisine', 'worldcup', 'crimerate', 'happiness', 'nobelprize',
      'temperature', 'precipitation', 'tourism', 'michelin', 'bigmac', 'lifeexpectancy',
      'marriageage', 'sexratio', 'tallestbuilding', 'density', 'carexports',
      'militarypersonel', 'rent', 'poorestgdp', 'university', 'volcano', 'flamingo',
      'disasterrisk', 'longestriver', 'renewableenergy', 'millionaires', 'gm',
    ];
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'population';
    const isDailyParam = params.get('daily') === 'true';
    if (isDailyParam || !PREMIUM_MODES.includes(mode)) {
      const el = document.getElementById('authLoadingOverlay');
      if (el) el.style.display = 'none';
    }
  })();
</script>

<script type="module">
  import { supabase } from './js/supabase-client.js';
  import { isValidDailyChallenge } from './js/daily-challenge.js';
  import { CATEGORY_ID_MAP } from './js/top10-categories-loader.js';
  import { categoriesConfig } from './js/categories-config.js';

  // ========================================
  // 🔒 PREMIUM VALIDATION GUARD
  // ========================================

  const PREMIUM_MODES = [
    'coastline', 'cuisine', 'worldcup', 'crimerate', 'happiness', 'nobelprize',
    'temperature', 'precipitation', 'tourism', 'michelin', 'bigmac', 'lifeexpectancy',
    'marriageage', 'sexratio', 'tallestbuilding', 'density', 'carexports',
    'militarypersonel', 'rent', 'poorestgdp', 'university', 'volcano', 'flamingo',
    'disasterrisk', 'longestriver', 'renewableenergy', 'millionaires', 'gm',
  ];

  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode') || 'population';
  const isDailyParam = params.get('daily') === 'true';

  // SECURITY FIX: Validate that this is actually today's daily challenge
  const isValidDaily = isDailyParam && isValidDailyChallenge('classic', mode);

  if (isDailyParam && !isValidDaily) {
    console.warn('⚠️ Invalid daily challenge attempt detected - mode/category mismatch');
  }

  const requiresPremium = PREMIUM_MODES.includes(mode) && !isValidDaily;

  // Kick off a single session fetch immediately — reused by both the gate check and menu logic
  const sessionPromise = supabase.auth.getSession();

  // For free modes: overlay already removed by plain script above; this is a no-op safety net
  if (!requiresPremium) {
    document.getElementById('authLoadingOverlay').style.display = 'none';
  }

  // Non-blocking: menu button management — runs after session resolves, never blocks game start
  sessionPromise.then(async ({ data: { session } }) => {
    if (!session?.user) {
      document.querySelectorAll('.menu-btn-account').forEach(btn => btn.remove());
      document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
      return;
    }
    // For free modes: check is_premium for upgrade button (premium modes handle this in the gate below)
    if (!requiresPremium) {
      const { data: profile } = await supabase
        .from('users').select('is_premium').eq('id', session.user.id).single();
      if (profile?.is_premium) {
        document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
      } else {
        document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
      }
    }
  }).catch(() => {});

  // ========================================
  // 🎮 GAME INITIALIZATION
  // ========================================

  const classicTitles = {
    population:      'RANK THESE COUNTRIES FROM LARGEST TO SMALLEST POPULATION 👥',
    gdp:             'RANK THESE COUNTRIES BY GDP PER PERSON 💰',
    happiness:       'RANK THESE COUNTRIES BY NATIONAL HAPPINESS SCORES 😊',
    forest:          'RANK THESE COUNTRIES BY TOTAL AREA COVERED BY FORESTS 🌲',
    coastline:       'RANK THESE COUNTRIES BY TOTAL COASTLINE LENGTH 🏝️',
    cuisine:         'RANK THESE COUNTRIES BY CUISINE POPULARITY AND QUALITY 🍽️',
    olympic:         'RANK THESE COUNTRIES BY TOTAL OLYMPIC MEDALS WON 🥇',
    worldcup:        'RANK THESE COUNTRIES BY NUMBER OF FIFA WORLD CUP TITLES ⚽',
    landmass:        'RANK THESE COUNTRIES FROM LARGEST TO SMALLEST TOTAL LAND AREA 🌍',
    crimerate:       'RANK THESE COUNTRIES BY HIGHEST CRIME RATE SCORE 🚨',
    altitude:        'RANK THESE COUNTRIES BY HIGHEST MOUNTAIN ELEVATION 🏔️',
    passport:        'RANK THESE COUNTRIES BY STRONGEST PASSPORT 🛂',
    beer:            'RANK THESE COUNTRIES BY ANUAL BEER CONSUMPTION PER PERSON 🍺',
    nobelprize:      'RANK THESE COUNTRIES BY MOST NOBEL PRIZE WINNERS 🕊️',
    temperature:     'RANK THESE COUNTRIES BY HIGHEST AVERAGE TEMPERATURE ☀️',
    hightemp:        'RANK THESE COUNTRIES BY HIGHEST AVERAGE TEMPERATURE ☀️',
    precipitation:   'RANK THESE COUNTRIES BY HIGHEST AVERAGE PERCIPITATION 🌧️',
    rainfall:        'RANK THESE COUNTRIES BY HIGHEST AVERAGE PERCIPITATION 🌧️',
    tourism:         'RANK THESE COUNTRIES BY NUMBER OF TOURIST VISITS IN 2025 ✈️',
    michelin:        'RANK THESE COUNTRIES BY MICHELIN STARRED RESTAURANTS ⭐',
    bigmac:          'RANK THESE COUNTRIES BY HIGHEST BIG MAC PRICE 🍔',
    lifeexpectancy:  'RANK THESE COUNTRIES BY HIGHEST LIFE EXPECTANCY 🤍',
    marriageage:     'RANK THESE COUNTRIES BY HIGEST AVERAGE MARRIAGE AGE 💍',
    sexratio:        'RANK THESE COUNTRIES BY MOST MEN PER 100 WOMEN ⚖️',
    tallestbuilding: 'RANK THESE COUNTRIES BY TALLEST BUILDINGS 🏙️',
    density:         'RANK THESE COUNTRIES BY BIGGEST POPULATION DENSITY 👨‍👩‍👧‍👦',
    carexports:      'RANK THESE COUNTRIES BY HIGHEST CAR EXPORTS 🚗',
    militarypersonel:'RANK THESE COUNTRIES BY MOST MILITARY PERSONNEL 🪖',
    rent:            'RANK THESE COUNTRIES BY HIGHEST AVERAGE 1-BED, CAPITAL CITY RENT PRICE  🏠',
    poorestgdp:      'RANK THESE COUNTRIES BY LOWEST GDP PER CAPITA 📉',
    university:      'RANK THESE COUNTRIES BY HIGHEST NUMBER OF UNIVERSITIES 🎓',
    volcano:         'RANK THESE COUNTRIES BY HIGHEST NUMBER OF HOLOCENE VOLCANOES 🌋',
    flamingo:        'RANK THESE COUNTRIES BY HIGHEST FLAMINGO POPULATION 🦩',
    disasterrisk:    'RANK THESE COUNTRIES BY HIGHEST NATURAL DISASTER RISK 🌪️',
    longestriver:    'RANK THESE COUNTRIES BY LONGEST RIVER 🌊',
    renewableenergy: 'RANK THESE COUNTRIES BY HIGHEST % ENERGY USE FROM RENEWABLE SOURCES ♻️',
    millionaires:    'RANK THESE COUNTRIES BY HIGHEST NUMBER OF MILLIONAIRES 💰',
    gm:              'RANK THESE COUNTRIES BY HIGHEST NUMBER OF CHESS GRANDMASTERS ♟️',
  };

  (async () => {
    // For premium modes: enforce gate before revealing the page
    if (requiresPremium) {
      const { data: { session } } = await sessionPromise;
      let isPremium = false;

      if (session?.user) {
        const { data: profile } = await supabase
          .from('users').select('is_premium').eq('id', session.user.id).single();
        isPremium = profile?.is_premium === true;
        if (isPremium) {
          document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
        } else {
          document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
        }
      }

      if (!isPremium) {
        window.plausible?.('premium_clicked', { props: { source: 'premium_gate' } });
        window.location.href = 'premium.html';
        return;
      }

      document.getElementById('authLoadingOverlay').style.display = 'none';
    }

    // Load category data and game engine in parallel
    const config = categoriesConfig[mode] || categoriesConfig.population;
    const [categoryModule, { startBlindRankingGame, setupRankButtons }] = await Promise.all([
      import(`./js/categories/${config.dataFile}.js`),
      import('./js/blind-ranking.js'),
    ]);

    window.countries = categoryModule[config.dataKey];
    document.querySelector('.top-card-title').textContent = classicTitles[mode] || classicTitles.population;

    startBlindRankingGame(CATEGORY_ID_MAP[mode] || 0);
    setupRankButtons();
    window.scrollTo(0, 0);
  })();
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const menuToggle = document.getElementById("menuToggle");
    const menuOverlay = document.getElementById("menuOverlay");
    const closeMenu = document.getElementById("closeMenu");

    if (!menuToggle || !menuOverlay) return;

    menuToggle.addEventListener("click", () => {
      menuOverlay.classList.add("active");
    });

    if (closeMenu) {
      closeMenu.addEventListener("click", () => {
        menuOverlay.classList.remove("active");
      });
    }

    menuOverlay.addEventListener("click", (e) => {
      if (e.target === menuOverlay) {
        menuOverlay.classList.remove("active");
      }
    });
  });
</script>


<script type="module">
  import {
    getTodaysDailyChallenge,
    modeDisplayNames,
    categoryDisplayNames,
    categoryEmojis
  } from './js/daily-challenge.js';

  document.addEventListener('DOMContentLoaded', () => {
    const categorySpan = document.getElementById('dailyChallengeCategory');
    const bg = document.getElementById('dailyChallengeBg');

    const today = getTodaysDailyChallenge();

    if (today && categorySpan && bg) {
      const modeName = modeDisplayNames[today.mode] || today.mode.toUpperCase();
      const categoryName = categoryDisplayNames[today.category] || today.category;
      const emoji = categoryEmojis[today.category] || '';

      categorySpan.textContent = `${modeName}: ${categoryName} ${emoji}`;
      bg.style.backgroundImage = `url('images/categories/${today.category}.jpg')`;
    }
  });
</script>

</body>
