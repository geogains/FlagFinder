  <style>
    body {
      padding-top: 80px;
    }

    .results-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .results-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      padding: 3rem 2.5rem;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .results-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .results-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: bounce 0.8s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .results-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0d315a;
      margin-bottom: 0.5rem;
    }

    .results-category {
      font-size: 1.3rem;
      font-weight: 600;
      color: #3b82f6;
    }

    /* Stats Section */
    .results-stats {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(37, 99, 235, 0.1));
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-weight: 600;
      color: #6b7280;
      font-size: 1.05rem;
    }

    .stat-value {
      font-weight: 700;
      color: #0d315a;
      font-size: 1.15rem;
    }

    /* Try Other Modes Section */
    .try-other-modes {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-radius: 20px;
      padding: 2rem;
      margin-top: 2.5rem;
      text-align: center;
    }

    .try-other-modes h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0d315a;
      margin-bottom: 1.5rem;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .mode-btn {
      padding: 1.2rem 1.5rem;
      border: 2px solid rgba(102, 126, 234, 0.3);
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      background: white;
      color: #667eea;
    }

    .mode-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.25);
      border-color: #fa5d4f;
      background: linear-gradient(135deg, #ff9770, #ff6f61);
      color: white;
    }

    /* Action Buttons */
    .results-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 2rem;
    }

    .results-actions .btn:nth-child(1) {
      grid-column: 1 / -1;
    }

    .results-actions .btn:nth-child(4) {
      grid-column: 1 / -1;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff9770, #ff6f61);
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }

    /* Mobile Responsive */
    @media (max-width: 640px) {
      .results-card {
        padding: 2rem 1.5rem;
      }

      .results-title {
        font-size: 1.8rem;
      }

      .results-category {
        font-size: 1.1rem;
      }

      .results-actions {
        grid-template-columns: 1fr;
      }

      .results-actions .btn:nth-child(1),
      .results-actions .btn:nth-child(4) {
        grid-column: 1;
      }

      .mode-buttons {
        grid-template-columns: 1fr;
      }

    @media (max-width: 480px) {

      }

        padding: 1rem;

    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #b4f3e9 0%, #38bdf8 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 80px;
      height: 80px;
      border: 8px solid rgba(255, 255, 255, 0.2);
      border-top: 8px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 24px;
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
      font-family: 'Poppins', sans-serif;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .loading-emoji {
      font-size: 3rem;
      margin-bottom: 16px;
      animation: bounceLoading 0.8s ease infinite;
    }

    @keyframes bounceLoading {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    #mainContent {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #mainContent.visible {
      opacity: 1;
    }

    /* ── Premium Upsell Modal ── */
    #premiumModal {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(24px);
      z-index: 9999;
      width: min(360px, calc(100vw - 32px));
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;

      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
      pointer-events: none;
    }
    #premiumModal.visible {

      pointer-events: all;
    }
    #premiumModal .pm-image {

    }
    #premiumModal .pm-body {

    #premiumModal .pm-title {

      transition: background 0.2s ease;
    }
    #premiumModal .pm-close:hover {
      background: rgba(0,0,0,0.55);
    }
  </style>

<script type="module">
    import soundManager from './js/sound-manager.js';
    import { categoriesConfig } from './js/categories-config.js';

    // Initialize sounds
    const SOUND_MAP = {
      'perfect': '/sounds/perfect.mp3',
      'correct': '/sounds/correct.mp3',
      'tryagain': '/sounds/tryagain.mp3'
    };

    window.addEventListener("pointerdown", () => soundManager.unlock(), { once: true });
    
    soundManager.init(SOUND_MAP).then(() => {
      console.log('✅ Sounds loaded on results page');
    });

    const params = new URLSearchParams(window.location.search);
    const categoryKey = params.get('category') || 'population';
    const score = parseInt(params.get('score')) || 0;
    const correct = parseInt(params.get('correct')) || 0;
    const total = parseInt(params.get('total')) || 0;
    const accuracy = parseInt(params.get('accuracy')) || 0;
    const timeUsed = parseInt(params.get('time')) || 0;
    const lives = parseInt(params.get('lives')) || 0;
    
    // Play appropriate sound based on performance
    if (accuracy >= 80) {
      soundManager.play('perfect'); // 80%+ accuracy = excellent!
    } else if (accuracy >= 60) {
      soundManager.play('correct');  // 60-79% = good job
    } else {
      soundManager.play('tryagain'); // <60% = try again
    }

    const savedResults = localStorage.getItem('vsResults');
    let resultsData = null;

    if (savedResults) {
      try {
        resultsData = JSON.parse(savedResults);
      } catch (e) {
        console.error('Error parsing saved results:', e);
      }
    }

    const finalScore = resultsData?.score || score;
    const finalCorrect = resultsData?.correct || correct;
    const finalTotal = resultsData?.total || total;
    const finalAccuracy = resultsData?.accuracy || accuracy;
    const finalTime = resultsData?.timeUsed || timeUsed;
    const finalLives = resultsData?.lives || lives;
    const categoryName = resultsData?.categoryName || getCategoryDisplayName(categoryKey);

    displayResults();

    // Hide loading overlay and show content
    function hideLoading() {
      const overlay = document.getElementById('loadingOverlay');
      const content = document.getElementById('mainContent');
      overlay.classList.add('hidden');
      content.classList.add('visible');
    }
    setTimeout(hideLoading, 300);

    function getCategoryDisplayName(key) {
      return categoriesConfig[key]?.title || key.charAt(0).toUpperCase() + key.slice(1);
    }

    function displayResults() {
      let emoji, title;
      if (finalCorrect >= 20) {
        emoji = '🏆';
        title = 'Amazing!';
      } else if (finalCorrect >= 10) {
        emoji = '🌟';
        title = 'Great Job!';
      } else if (finalLives === 0) {
        emoji = '💪';
        title = 'Game Over!';
      } else {
        emoji = '👍';
        title = 'Good Try!';
      }
      
      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('resultsCategory').textContent = categoryName;

      document.getElementById('finalScore').textContent = finalScore;
      
      const maxLives = 3;
      const redHearts = '❤️'.repeat(finalLives);
      const whiteHearts = '🤍'.repeat(maxLives - finalLives);
      document.getElementById('finalLives').textContent = whiteHearts + redHearts;
      
      document.getElementById('finalCorrect').textContent = `${finalCorrect}/${finalTotal}`;
      document.getElementById('finalAccuracy').textContent = `${finalAccuracy}%`;
      
      const minutes = Math.floor(finalTime / 60);
      const seconds = finalTime % 60;
      document.getElementById('finalTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

      document.getElementById('tryModesTitle').textContent = `🎮 Try other ${categoryName} game modes`;
      
      document.getElementById('classicModeBtn').onclick = () => {
        window.location.href = `game.html?mode=${categoryKey}`;
      };
      
      document.getElementById('top10ModeBtn').onclick = () => {
        window.location.href = `top10.html?mode=${categoryKey}`;
      };

      document.getElementById('playAgainBtn').onclick = () => {
        window.location.href = `vs.html?mode=${categoryKey}`;
      };

      document.getElementById('shareBtn').onclick = shareResults;
    }

    function shareResults() {
      const maxLives = 3;
      const redHearts = '❤️'.repeat(finalLives);
      const whiteHearts = '🤍'.repeat(maxLives - finalLives);
      const livesDisplay = whiteHearts + redHearts;
      
      const text = `🌍 GeoRanks - ${categoryName} VS Mode
Score: ${finalScore} | ${finalCorrect}/${finalTotal} correct (${finalAccuracy}%)
Lives: ${livesDisplay}

Can you beat my score? Play at geo-ranks.com/vs.html?mode=${categoryKey}`;

      if (navigator.share) {
        navigator.share({
          title: 'GeoRanks Results',
          text: text
        }).catch(err => console.log('Share failed:', err));
      } else {
        navigator.clipboard.writeText(text);
        alert('Results copied to clipboard!');
      }
    }

  </script>

  <!-- Pending Score Save -->
  <script type="module">
    import { supabase } from './js/supabase-client.js';
    (async () => {
      const raw = localStorage.getItem('vsPendingSave');
      if (!raw) return;
      // Remove BEFORE save — VS uses insert (not upsert); removing first prevents duplicate
      // inserts on refresh even if the browser crashes mid-save
      localStorage.removeItem('vsPendingSave');
      let record;
      try { record = JSON.parse(raw); } catch { return; }
      // Relevance guard (record already removed, so a mismatch is just discarded)
      const urlParams = new URLSearchParams(window.location.search);
      if (!record.categoryKey || !record.categoryId || record.score == null) return;
      if (record.categoryKey !== urlParams.get('category')) return;
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) return;
      const { error } = await supabase.from('vs_scores').insert({
        user_id: session.user.id,
        category_id: record.categoryId,
        score: record.score,
        correct_count: record.correct,
        incorrect_count: record.incorrect,
        accuracy: record.accuracy,
        time_played: record.timePlayed
      }).select().single();
      if (error) console.error('❌ VS score save failed:', error);
      else console.log('✅ VS score saved:', record.score);
      if (record.isDailyChallenge) {
        const today = new Date().toISOString().split('T')[0];
        const { error: dailyError } = await supabase.from('daily_challenge_scores').upsert({
          user_id: session.user.id,
          category_id: record.categoryId,
          played_date: today,
          score: record.score,
          completed: true
        }).select();
        if (dailyError) console.error('❌ VS daily save failed:', dailyError);
        else console.log('✅ VS daily challenge score saved.');
      }
    })();
  </script>

  <!-- Account/Premium Button Removal -->
  <script type="module">
    import { supabase } from './js/supabase-client.js';

    function maybeShowPremiumModal() {
      const key = 'georanks_completions';
      const count = parseInt(localStorage.getItem(key) || '0') + 1;
      localStorage.setItem(key, count);
      if (count % 3 === 1) {
        setTimeout(() => {
          document.getElementById('premiumModal')?.classList.add('visible');
        }, 1500);
      }
    }

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        const { data: profile } = await supabase.from('users').select('is_premium').eq('id', session.user.id).single();
        if (profile?.is_premium) {
          document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
        } else {
          document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
          maybeShowPremiumModal();
        }
      }
      if (!session?.user) {
        document.querySelectorAll('.menu-btn-account').forEach(btn => btn.remove());
        document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.style.display = 'block');
        maybeShowPremiumModal();
      }
    })();
  </script>

  <script type="module">
    import { getTodaysDailyChallenge, modeDisplayNames, categoryDisplayNames, categoryEmojis } from './js/daily-challenge.js';
    document.addEventListener('DOMContentLoaded', () => {
      const categorySpan = document.getElementById('dailyChallengeCategory');
      const bg = document.getElementById('dailyChallengeBg');
      const today = getTodaysDailyChallenge();
      if (today && categorySpan && bg) {
        const modeName = modeDisplayNames[today.mode] || today.mode.toUpperCase();
        const categoryName = categoryDisplayNames[today.category] || today.category;
        const emoji = categoryEmojis[today.category] || '';
        categorySpan.textContent = `${modeName}: ${categoryName} ${emoji}`;
        bg.style.backgroundImage = `url('images/categories/${today.category}.jpg')`;
      }
    });
  </script>

    <div class="pm-body">
      <p class="pm-title">Unlock 36 Premium Categories</p>
      <p class="pm-sub">You're only seeing the free ones. Go further.</p>
      <button class="pm-btn" onclick="window.location.href='premium.html'">View Premium Categories</button>
    </div>
  </div>
