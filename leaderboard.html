<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoRanks — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game-modes.css" />
  
  <!-- Shared Page Styles -->
  <link rel="stylesheet" href="css/page.css">
  
  <style>
    /* ========================================
       BODY & PAGE LAYOUT
    ======================================== */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .leaderboard-page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    /* ========================================
       LEADERBOARD SPECIFIC STYLES
    ======================================== */
    .leaderboard-container {
      max-width: 720px;
      margin: 120px auto 60px;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      text-align: center;
      overflow: visible;
      opacity: 0;
      animation: fadeInContainer 0.5s ease-out forwards;
    }
    
    @keyframes fadeInContainer {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .leaderboard-container h1 {
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.2s forwards;
    }
    
    .page-title {
      font-size: 2.4rem;
      font-weight: 700;
      color: #0d315a;
      margin-bottom: 8px;
    }
    
    .page-title-text {
      background: #0d315a;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search-bar-wrapper {
      max-width: 600px;
      margin: 20px auto;
      position: relative;
      box-sizing: border-box;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.4s forwards;
      z-index: 100;
    }

    .search-bar-wrapper input {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.1rem;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      cursor: pointer;
      box-sizing: border-box;
    }

    .search-bar-wrapper input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
    }

    .search-bar-wrapper input:hover {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 8px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      max-height: 400px;
      overflow-y: auto;
      z-index: 10000;
      display: none;
    }

    .search-dropdown.active {
      display: block;
      animation: dropdownSlide 0.3s ease-out;
    }

    @keyframes dropdownSlide {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-dropdown-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .search-dropdown-item:last-child {
      border-bottom: none;
    }

    .search-dropdown-item:hover {
      background: rgba(102,126,234,0.08);
    }

    .search-dropdown-item img {
      width: 60px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .search-dropdown-text {
      flex: 1;
      font-weight: 500;
      color: #333;
      font-size: 1rem;
    }

    .search-dropdown::-webkit-scrollbar {
      width: 8px;
    }

    .search-dropdown::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.05);
      border-radius: 10px;
    }

    .search-dropdown::-webkit-scrollbar-thumb {
      background: rgba(102,126,234,0.3);
      border-radius: 10px;
    }

    .search-dropdown::-webkit-scrollbar-thumb:hover {
      background: rgba(102,126,234,0.5);
    }

    .no-results {
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
    }

    .mode-toggle {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.6s forwards;
    }

    .mode-btn {
      padding: 12px 28px;
      background: white;
      border: 2px solid rgba(102, 126, 234, 0.15);
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      color: #0d315a;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #ff9770 0%, #ff6f61 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(255, 151, 112, 0.3);
    }

    .mode-btn:hover:not(.active) {
      background: rgba(102, 126, 234, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.15);
    }

    .date-selector {
      margin: 20px 0;
      display: none;
    }

    .date-selector.active {
      display: block;
    }

    .date-selector select {
      padding: 10px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      cursor: pointer;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      margin-top: 1rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      opacity: 0;
      animation: fadeIn 0.5s ease-out 0.8s forwards;
      position: relative;
      z-index: 1;
    }

    .leaderboard-table th {
      font-weight: 600;
      padding: 1rem;
      font-size: 1.2rem;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.08), rgba(118, 75, 162, 0.08));
      color: #0d315a;
      border-bottom: 2px solid rgba(102, 126, 234, 0.15);
    }

    .leaderboard-table td {
      padding: 1.1rem 0.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-size: 1.25rem;
      text-align: center;
      background: white;
      transition: background 0.2s ease;
    }

    .leaderboard-table tbody tr:hover td {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.04), rgba(118, 75, 162, 0.04));
    }

    .leaderboard-table tbody tr:last-child td {
      border-bottom: none;
    }

    .leaderboard-table tbody tr td[colspan] {
      text-align: center !important;
      padding: 2rem 1rem;
    }

    .leaderboard-table th:nth-child(1), .leaderboard-table td:nth-child(1) { width: 20%; }
    .leaderboard-table th:nth-child(2), .leaderboard-table td:nth-child(2) { width: 20%; }
    .leaderboard-table th:nth-child(3), .leaderboard-table td:nth-child(3) { width: 40%; }
    .leaderboard-table th:nth-child(4), .leaderboard-table td:nth-child(4) { width: 20%; }

    .leaderboard-table th:first-child { border-top-left-radius: 12px; }
    .leaderboard-table th:last-child { border-top-right-radius: 12px; }
    .leaderboard-table tr:last-child td:first-child { border-bottom-left-radius: 12px; }
    .leaderboard-table tr:last-child td:last-child { border-bottom-right-radius: 12px; }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .avatar-wrapper img.avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(102, 126, 234, 0.15);
    }

    .avatar-wrapper img.premium-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
    }

    .leaderboard-avatar {
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .leaderboard-rank {
      font-weight: bold;
      font-size: 1.25rem;
    }

    .leaderboard-rank:has(> .medal) {
      line-height: 1;
    }

    .medal {
      font-size: 1.75rem;
      display: inline-block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .back-home {
      margin-top: 2.2rem;
      display: inline-block;
      padding: 0.9rem 1.8rem;
      border-radius: 10px;
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      text-decoration: none;
      background: linear-gradient(135deg, #ff9770, #ff6f61);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .leaderboard-container { 
        margin: 100px 1rem 40px; 
        padding: 1.5rem 1rem;
        max-width: calc(100% - 2rem);
      }
      .mode-toggle { flex-wrap: wrap; gap: 8px; }
      .mode-btn { padding: 8px 16px; font-size: 0.9rem; }
      .avatar-wrapper, .avatar-wrapper img.avatar { width: 50px; height: 50px; }
      .avatar-wrapper img.premium-badge { width: 18px; height: 18px; bottom: -2px; right: -2px; }
      .leaderboard-table th { font-size: 1rem; padding: 0.75rem 0.5rem; }
      .leaderboard-table td { font-size: 1rem; padding: 0.75rem 0.25rem; }
      .medal { font-size: 1.5rem; }
      .back-home { padding: 0.75rem 1.5rem; font-size: 1rem; }
    }

    @media (max-width: 480px) {
      .leaderboard-container {
        margin: 90px 0.75rem 30px;
        padding: 1.25rem 0.75rem;
        max-width: calc(100% - 1.5rem);
      }
    }

    /* ── Load More & Find My Rank ── */

    /* Row highlight for current user */
    .leaderboard-table tbody tr.user-highlight td {
      background: rgba(255, 111, 97, 0.06) !important;
    }

    /* First and last cell get the rounded pill outline */
    .leaderboard-table tbody tr.user-highlight td:first-child {
      border-left: none;
      box-shadow: inset 3px 0 0 #ff6f61;
    }

    /* Separator row that appears between top-20 and user's neighbourhood */
    .leaderboard-table tbody tr.rank-gap td {
      background: rgba(13,49,90,0.03);
      color: #aab4c0;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 10px;
      text-align: center;
      border-bottom: 1px dashed rgba(13,49,90,0.12);
    }

    /* Fade-in for appended rows */
    @keyframes rowAppend {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .row-append { animation: rowAppend 0.25s ease both; }

    /* Table footer action area */
    .leaderboard-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lb-action-btn {
      flex: 1;
      min-width: 140px;
      max-width: 220px;
      padding: 13px 18px;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .lb-action-btn:hover  { transform: translateY(-2px); }
    .lb-action-btn:active { transform: translateY(0); }

    .lb-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-find-me {
      background: linear-gradient(135deg, #ff9770, #ff6f61);
      color: white;
      box-shadow: 0 4px 14px rgba(255,111,97,0.35);
    }
    .btn-find-me:hover { box-shadow: 0 7px 20px rgba(255,111,97,0.45); }

    /* "Your rank" toast that floats above the table when user is out of view */
    .my-rank-toast {
      display: none;
      position: sticky;
      bottom: 16px;
      left: 0; right: 0;
      margin: 10px auto 0;
      width: fit-content;
      background: linear-gradient(135deg, #ff9770, #ff6f61);
      color: white;
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(255,111,97,0.4);
      cursor: pointer;
      z-index: 50;
      animation: toastIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .my-rank-toast.visible { display: block; }
  </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const menuToggle = document.getElementById('menuToggle');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenu = document.getElementById('closeMenu');
  let scrollPosition = 0;

  if (menuToggle && menuOverlay) {
    menuToggle.addEventListener('click', () => {
      scrollPosition = window.pageYOffset;
      document.body.classList.add('menu-open');
      document.body.style.top = `-${scrollPosition}px`;
      menuOverlay.classList.add('active');
    });

    function closeMenuHandler() {
      document.body.classList.remove('menu-open');
      document.body.style.top = '';
      window.scrollTo(0, scrollPosition);
      menuOverlay.classList.remove('active');
    }

    closeMenu?.addEventListener('click', closeMenuHandler);

    menuOverlay.addEventListener('click', (e) => {
      if (e.target === menuOverlay) {
        closeMenuHandler();
      }
    });
  }
});
</script>

<!-- ========================================
     SEARCH DROPDOWN JAVASCRIPT
======================================== -->
<script type="module">
  import { supabase } from './js/supabase-client.js';

  const searchInput = document.getElementById('categorySearchInput');
  const searchDropdown = document.getElementById('searchDropdown');

  const displayNameMap = {
    'temperature': 'Highest Temperature', 'precipitation': 'Rainfall', 'altitude': 'Highest Altitude',
    'gdp': 'GDP Per Capita', 'population': 'Population', 'forest': 'Forest Cover',
    'coastline': 'Longest Coastline', 'olympic': 'Olympic Medals', 'cuisine': 'Cuisine',
    'worldcup': 'World Cup Trophies', 'landmass': 'Land Mass', 'crimerate': 'Crime Rate',
    'happiness': 'Happiness', 'passport': 'Passport Strength', 'beer': 'Beer Consumption',
    'nobelprize': 'Nobel Prize Winners', 'michelin': 'Michelin Restaurants', 'bigmac': 'BigMac Index',
    'lifeexpectancy': 'Life Expectancy', 'tourism': 'Tourist Visits', 'marriageage': 'Marriage Age',
    'sexratio': 'Gender Ratio', 'tallestbuilding': 'Tallest Building', 'density': 'Population Density',
    'carexports': 'Car Exports', 'militarypersonel': 'Military Personnel', 'rent': 'Rent Prices',
    'poorestgdp': 'Poorest Countries', 'university': 'Universities', 'volcano': 'Volcanoes',
    'flamingo': 'Flamingos', 'disasterrisk': 'Natural Disasters', 'longestriver': 'Longest River',
    'renewableenergy': 'Renewable Energy', 'millionaires': 'Millionaires', 'gm': 'Chess Grandmasters'
  };

  const imageMap = { temperature: 'hightemp', precipitation: 'rainfall' };

  function formatCategoryName(name) {
    return name.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
  }

  let allCategories = [];

  // Load categories
  async function loadCategories() {
    const { data: categories } = await supabase.from('categories').select('*').order('name');
    if (categories) {
      allCategories = categories.map(cat => ({
        category: cat.name,
        display: displayNameMap[cat.name.toLowerCase()] || formatCategoryName(cat.name),
        image: imageMap[cat.name.toLowerCase()] || cat.name.toLowerCase() + '.jpg'
      })).sort((a, b) => a.display.localeCompare(b.display));
    }
  }

  loadCategories();

  // Clear input and show all categories when clicked
  searchInput?.addEventListener('click', () => {
    searchInput.value = '';
    renderDropdown(allCategories);
  });

  // Show all categories when focused
  searchInput?.addEventListener('focus', () => {
    if (searchInput.value.trim().length === 0) {
      renderDropdown(allCategories);
    }
  });

  // Filter as user types
  searchInput?.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    
    if (query.length === 0) {
      renderDropdown(allCategories);
      return;
    }

    const filtered = allCategories.filter(cat => 
      cat.display.toLowerCase().includes(query)
    );

    if (filtered.length === 0) {
      searchDropdown.innerHTML = '<div class="no-results">No categories found</div>';
      searchDropdown.classList.add('active');
      return;
    }

    renderDropdown(filtered);
  });

  function renderDropdown(categories) {
    searchDropdown.innerHTML = categories.map(cat => `
      <div class="search-dropdown-item" data-category="${cat.category}" data-display="${cat.display}">
        <img src="images/categories/${cat.image}" alt="${cat.display}" />
        <div class="search-dropdown-text">${cat.display}</div>
      </div>
    `).join('');

    searchDropdown.classList.add('active');

    searchDropdown.querySelectorAll('.search-dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        const category = item.dataset.category;
        const display = item.dataset.display;
        
        searchInput.value = display; // Set the display name in the search bar
        searchDropdown.classList.remove('active');

        if (window.currentMode === 'classic' || window.currentMode === 'top10' || window.currentMode === 'vs') {
          window.loadLeaderboard(category);
        }
        window.currentCategory = category;
      });
    });
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
      searchDropdown.classList.remove('active');
    }
  });
</script>

<script type="module">
  import { supabase } from './js/supabase-client.js';

  const leaderboardBody        = document.getElementById("leaderboardBody");
  const dateDropdown           = document.getElementById("dateDropdown");
  const dateSelector           = document.getElementById("dateSelector");
  const categorySearchWrapper  = document.getElementById("categorySearchWrapper");
  const dailyChallengeTitle    = document.getElementById("dailyChallengeTitle");
  const findMyRankBtn          = document.getElementById("findMyRankBtn");
  const myRankToast            = document.getElementById("myRankToast");

  const PAGE_SIZE = 20;

  let currentMode      = 'daily-challenge';
  let currentDate      = null;
  let currentCategory  = null;
  let currentOffset    = 0;
  let totalCount       = 0;
  let loggedInUserId   = null;
  let loggedInUsername = null;
  let userHighlightRow = null;

  // daily challenge context needed for Find My Rank
  let _dailyCategoryId = null;
  let _dailyDate       = null;

  // ── Auth: get logged-in user so we can show Find My Rank ──────────────────
  supabase.auth.getSession().then(async ({ data: { session } }) => {
    if (session?.user) {
      loggedInUserId = session.user.id;
      const { data: profile } = await supabase
        .from('users').select('username').eq('id', session.user.id).single();
      loggedInUsername = profile?.username || null;
      findMyRankBtn.style.display = '';   // show the button now we know who they are
    }
  });

  const displayNameMap = {
    'hightemp': 'Highest Temperature', 'rainfall': 'Annual Rainfall', 'altitude': 'Highest Altitude',
    'gdp': 'GDP Per Capita', 'population': 'Population', 'forest': 'Forest Coverage',
    'coastline': 'Coastline Length', 'olympic': 'Olympic Medals', 'cuisine': 'Cuisine Popularity',
    'worldcup': 'World Cup Wins', 'landmass': 'Landmass', 'crimerate': 'Crime Rate',
    'happiness': 'Happiness Index', 'passport': 'Passport Power', 'beer': 'Beer Consumption',
    'nobelprize': 'Nobel Prizes', 'michelin': 'Michelin Restaurants', 'bigmac': 'BigMac Index',
    'lifeexpectancy': 'Life Expectancy', 'tourism': 'Tourist Visits', 'marriageage': 'Marriage Age',
    'sexratio': 'Gender Ratio', 'tallestbuilding': 'Tallest Building', 'density': 'Population Density',
    'carexports': 'Car Exports', 'militarypersonel': 'Military Personnel', 'rent': 'Rent Prices',
    'poorestgdp': 'Poorest Countries', 'university': 'Universities', 'volcano': 'Volcanoes',
    'flamingo': 'Flamingos', 'disasterrisk': 'Natural Disasters', 'longestriver': 'Longest River',
    'renewableenergy': 'Renewable Energy', 'millionaires': 'Millionaires', 'gm': 'Chess Grandmasters'
  };

  function formatCategoryName(name) {
    return name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ── Row builder ────────────────────────────────────────────────────────────
  function buildRow(entry, globalIndex, animate = false) {
    const user = entry.users || {};
    const isMe = loggedInUserId && user.id === loggedInUserId;
    const rankDisplay =
      globalIndex === 0 ? '<span class="medal">🥇</span>' :
      globalIndex === 1 ? '<span class="medal">🥈</span>' :
      globalIndex === 2 ? '<span class="medal">🥉</span>' :
      `#${globalIndex + 1}`;

    const row = document.createElement('tr');
    if (animate) row.classList.add('row-append');
    if (isMe) {
      row.classList.add('user-highlight');
      userHighlightRow = row;
    }
    row.innerHTML = `
      <td class="leaderboard-rank">${rankDisplay}</td>
      <td>
        <div class="avatar-wrapper" style="width:50px;height:50px;">
          <img src="${user.avatar_url || 'assets/profile-icon.jpg'}" loading="lazy"
               class="leaderboard-avatar avatar" style="width:50px;height:50px;border-radius:50%;" />
          ${user.is_premium ? '<img src="assets/GeoRanksPremium.png" class="premium-badge" />' : ''}
        </div>
      </td>
      <td>${user.username || 'Anonymous'}</td>
      <td>${entry.score}</td>
    `;
    return row;
  }

  // ── Reset state on each fresh load ────────────────────────────────────────
  function resetState() {
    currentOffset    = 0;
    totalCount       = 0;
    userHighlightRow = null;
    _dailyCategoryId = null;
    _dailyDate       = null;
    myRankToast.classList.remove('visible');
    myRankToast.textContent = '';
  }

  // ── Find My Rank button ────────────────────────────────────────────────────
  findMyRankBtn.addEventListener('click', async () => {
    if (!loggedInUserId) return;

    // If already highlighted and visible, just scroll to it
    if (userHighlightRow) {
      userHighlightRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    findMyRankBtn.disabled    = true;
    findMyRankBtn.textContent = '📍 Finding…';

    try {
      if (currentMode === 'daily-challenge') {
        await jumpToMyRankDaily();
      } else {
        await jumpToMyRank();
      }
    } finally {
      findMyRankBtn.disabled    = false;
      findMyRankBtn.textContent = '📍 Find My Rank';
    }
  });

  // ── Sticky toast: show when user's row is off-screen ──────────────────────
  function setupToastObserver() {
    if (!userHighlightRow) return;
    myRankToast.classList.remove('visible');

    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        myRankToast.classList.remove('visible');
      } else {
        myRankToast.classList.add('visible');
      }
    }, { threshold: 0.1 });

    observer.observe(userHighlightRow);
    myRankToast.onclick = () => userHighlightRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Mode toggle ────────────────────────────────────────────────────────────
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;

      if (currentMode === 'daily-challenge') {
        dateSelector.classList.add('active');
        categorySearchWrapper.style.display = 'none';
        dailyChallengeTitle.style.display   = 'block';
        populateDateDropdown();
        if (currentDate) loadDailyChallengeLeaderboardForDate(currentDate);
      } else {
        dateSelector.classList.remove('active');
        categorySearchWrapper.style.display = 'block';
        dailyChallengeTitle.style.display   = 'none';
        if (currentCategory) {
          loadLeaderboard(currentCategory);
          const dn = displayNameMap[currentCategory.toLowerCase()] || formatCategoryName(currentCategory);
          document.getElementById("categorySearchInput").value = dn;
        }
      }
    });
  });

  dateDropdown?.addEventListener('change', e => {
    currentDate = e.target.value;
    loadDailyChallengeLeaderboardForDate(currentDate);
  });

  // ── Seeded daily challenge logic ───────────────────────────────────────────
  function seededRandom(seed) { const x = Math.sin(seed) * 10000; return x - Math.floor(x); }

  function getDailyChallengeForDate(dateString) {
    const date = new Date(dateString + 'T00:00:00Z');
    const seed = date.getUTCFullYear() * 10000 + (date.getUTCMonth() + 1) * 100 + date.getUTCDate();
    const gameModes = ['classic', 'top10', 'vs'];
    const top10Valid = ['population','gdp','landmass','altitude','forest','coastline','passport','beer',
      'nobelprize','hightemp','rainfall','crimerate','happiness','tourism','michelin','bigmac',
      'lifeexpectancy','marriageage','sexratio','tallestbuilding','density','carexports',
      'militarypersonel','rent','poorestgdp','university','volcano','flamingo','disasterrisk',
      'longestriver','renewableenergy','millionaires','gm'];
    const allCats = ['population','gdp','landmass','altitude','forest','coastline','olympic','worldcup',
      'passport','beer','nobelprize','hightemp','rainfall','crimerate','happiness','cuisine','tourism',
      'michelin','bigmac','lifeexpectancy','marriageage','sexratio','tallestbuilding','density',
      'carexports','militarypersonel','rent','poorestgdp','university','volcano','flamingo',
      'disasterrisk','longestriver','renewableenergy','millionaires','gm'];
    const modeIndex = Math.floor(seededRandom(seed) * gameModes.length);
    const selectedMode = gameModes[modeIndex];
    const valid = selectedMode === 'top10' ? top10Valid : allCats;
    return { mode: selectedMode, category: valid[Math.floor(seededRandom(seed + 1000) * valid.length)] };
  }

  // ── Daily Challenge loader ─────────────────────────────────────────────────
  async function loadDailyChallengeLeaderboardForDate(date) {
    resetState();
    leaderboardBody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
    if (!date) { leaderboardBody.innerHTML = '<tr><td colspan="4">❌ No date selected</td></tr>'; return; }

    const dailyChallenge = getDailyChallengeForDate(date);
    const { CATEGORY_ID_MAP } = await import('./js/top10-categories-loader.js');
    const categoryId = CATEGORY_ID_MAP[dailyChallenge.category];
    if (!categoryId) {
      leaderboardBody.innerHTML = '<tr><td colspan="4">❌ Category not found</td></tr>';
      dailyChallengeTitle.textContent = '';
      return;
    }

    // Store for Find My Rank
    _dailyCategoryId = categoryId;
    _dailyDate       = date;

    const modeNames = { classic: 'Classic', top10: 'Top 10', vs: 'VS' };
    dailyChallengeTitle.textContent =
      `${modeNames[dailyChallenge.mode]} - ${displayNameMap[dailyChallenge.category] || formatCategoryName(dailyChallenge.category)}`;

    const { data: scores, error } = await supabase
      .from("daily_challenge_scores")
      .select('score, user_id, users!fk_user(id, username, avatar_url, is_premium)')
      .eq("category_id", categoryId)
      .eq("played_date", date)
      .order("score", { ascending: false })
      .limit(PAGE_SIZE);

    if (error) {
      leaderboardBody.innerHTML = '<tr><td colspan="4">❌ Error loading scores</td></tr>';
      return;
    }
    renderFirstPage(scores || []);
  }

  // ── Category loaders ───────────────────────────────────────────────────────
  async function loadCategories() {
    const params = new URLSearchParams(window.location.search);
    const { data: categories } = await supabase.from("categories").select("*").order("name");
    if (!categories?.length) return;

    const sorted = categories
      .map(cat => ({ name: cat.name, display: displayNameMap[cat.name.toLowerCase()] || formatCategoryName(cat.name) }))
      .sort((a, b) => a.display.localeCompare(b.display));

    const initial = params.get("mode") || sorted[0].name;
    currentCategory = initial;

    if (currentMode === 'classic' || currentMode === 'top10' || currentMode === 'vs') {
      categorySearchWrapper.style.display = 'block';
      dailyChallengeTitle.style.display   = 'none';
      dateSelector.classList.remove('active');
      loadLeaderboard(initial);
      document.getElementById("categorySearchInput").value =
        displayNameMap[initial.toLowerCase()] || formatCategoryName(initial);
    } else {
      categorySearchWrapper.style.display = 'none';
      dailyChallengeTitle.style.display   = 'block';
      dateSelector.classList.add('active');
      populateDateDropdown();
      if (dateDropdown.value) {
        currentDate = dateDropdown.value;
        loadDailyChallengeLeaderboardForDate(currentDate);
      }
    }
  }

  async function loadLeaderboard(categoryName) {
    resetState();
    leaderboardBody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
    currentCategory = categoryName;
    if (currentMode === 'classic')      await loadClassicLeaderboard(categoryName);
    else if (currentMode === 'top10')   await loadTop10BestLeaderboard(categoryName);
    else if (currentMode === 'vs')      await loadVSLeaderboard(categoryName);
  }

  // store query context for load-more & find-my-rank
  let _classicCategoryId = null;
  let _top10CategoryId   = null;
  let _vsAllScores       = null;   // full sorted array for VS (client-side paged)
  let _vsOffset          = 0;

  async function loadClassicLeaderboard(categoryName) {
    const { data: cat } = await supabase.from("categories").select("id").eq("name", categoryName).single();
    if (!cat) { leaderboardBody.innerHTML = '<tr><td colspan="4">❌ Category not found</td></tr>'; return; }
    _classicCategoryId = cat.id;

    const { data: scores } = await supabase.from("category_scores")
      .select('score, user_id, users!inner(id, username, avatar_url, is_premium)')
      .eq("category_id", cat.id)
      .order("score", { ascending: false })
      .range(0, PAGE_SIZE - 1);

    // Get total for jumpToMyRank paging
    const { count } = await supabase.from("category_scores")
      .select('*', { count: 'exact', head: true }).eq("category_id", cat.id);
    totalCount = count || 0;

    renderFirstPage(scores || []);
  }

  async function appendClassicPage() {
    const { data: scores } = await supabase.from("category_scores")
      .select('score, user_id, users!inner(id, username, avatar_url, is_premium)')
      .eq("category_id", _classicCategoryId)
      .order("score", { ascending: false })
      .range(currentOffset, currentOffset + PAGE_SIZE - 1);
    appendRows(scores || []);
  }

  async function loadTop10BestLeaderboard(categoryName) {
    const { CATEGORY_ID_MAP } = await import('./js/top10-categories-loader.js');
    _top10CategoryId = CATEGORY_ID_MAP[categoryName.toLowerCase()];
    if (!_top10CategoryId) {
      leaderboardBody.innerHTML = '<tr><td colspan="4">❌ Category not available for Top 10</td></tr>'; return;
    }

    const { data: scores } = await supabase.from("top10_best_scores")
      .select('score, user_id, users!fk_user(id, username, avatar_url, is_premium)')
      .eq("category_id", _top10CategoryId)
      .order("score", { ascending: false })
      .range(0, PAGE_SIZE - 1);

    // Get total for jumpToMyRank paging
    const { count } = await supabase.from("top10_best_scores")
      .select('*', { count: 'exact', head: true }).eq("category_id", _top10CategoryId);
    totalCount = count || 0;

    renderFirstPage(scores || []);
  }

  async function appendTop10Page() {
    const { data: scores } = await supabase.from("top10_best_scores")
      .select('score, user_id, users!fk_user(id, username, avatar_url, is_premium)')
      .eq("category_id", _top10CategoryId)
      .order("score", { ascending: false })
      .range(currentOffset, currentOffset + PAGE_SIZE - 1);
    appendRows(scores || []);
  }

  async function loadVSLeaderboard(categoryName) {
    const { CATEGORY_ID_MAP } = await import('./js/top10-categories-loader.js');
    const categoryId = CATEGORY_ID_MAP[categoryName.toLowerCase()];
    if (!categoryId) {
      leaderboardBody.innerHTML = '<tr><td colspan="4">❌ Category not available for VS</td></tr>'; return;
    }

    const { data: scores } = await supabase.from("vs_scores")
      .select('score, user_id, users!fk_user(id, username, avatar_url, is_premium)')
      .eq("category_id", categoryId)
      .order("score", { ascending: false });

    // Deduplicate to each user's best score
    const bestMap = new Map();
    scores?.forEach(s => {
      const ex = bestMap.get(s.user_id);
      if (!ex || s.score > ex.score) bestMap.set(s.user_id, s);
    });
    _vsAllScores = Array.from(bestMap.values()).sort((a, b) => b.score - a.score);
    _vsOffset    = 0;
    totalCount   = _vsAllScores.length;

    renderFirstPage(_vsAllScores.slice(0, PAGE_SIZE));
  }

  async function appendVSPage() {
    const slice = _vsAllScores.slice(currentOffset, currentOffset + PAGE_SIZE);
    appendRows(slice);
  }

  // ── Render helpers ─────────────────────────────────────────────────────────
  function renderFirstPage(scores) {
    leaderboardBody.innerHTML = '';
    userHighlightRow = null;

    if (!scores.length) {
      leaderboardBody.innerHTML = '<tr><td colspan="4">👤 No scores yet for this category</td></tr>';
      return;
    }

    scores.forEach((entry, i) => leaderboardBody.appendChild(buildRow(entry, i)));
    currentOffset = scores.length;

    if (userHighlightRow) setupToastObserver();
  }

  function appendRows(scores) {
    if (!scores.length) return;
    const startIndex = currentOffset;
    scores.forEach((entry, i) => leaderboardBody.appendChild(buildRow(entry, startIndex + i, true)));
    currentOffset += scores.length;

    if (userHighlightRow) setupToastObserver();
  }

  async function appendNextPage() {
    if (currentMode === 'classic')    await appendClassicPage();
    else if (currentMode === 'top10') await appendTop10Page();
    else if (currentMode === 'vs')    await appendVSPage();
  }

  // ── Find My Rank (Classic / Top10 / VS) ───────────────────────────────────
  async function jumpToMyRank() {
    if (!loggedInUserId) return;

    while (currentOffset < totalCount) {
      const prevOffset = currentOffset;
      await appendNextPage();

      if (userHighlightRow) {
        setTimeout(() => {
          userHighlightRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setupToastObserver();
          const rank = Array.from(leaderboardBody.querySelectorAll('tr')).indexOf(userHighlightRow) + 1;
          myRankToast.textContent = `📍 You're #${rank} — tap to jump back`;
        }, 100);
        return;
      }

      if (currentOffset === prevOffset) break;
    }

    alert(`You haven't played this category yet!`);
  }

  // ── Find My Rank (Daily Challenge) ────────────────────────────────────────
  async function jumpToMyRankDaily() {
    if (!loggedInUserId || !_dailyCategoryId || !_dailyDate) return;

    // Fetch ALL daily scores for this date/category so we can find the user anywhere
    const { data: allScores } = await supabase
      .from('daily_challenge_scores')
      .select('score, user_id, users!fk_user(id, username, avatar_url, is_premium)')
      .eq('category_id', _dailyCategoryId)
      .eq('played_date', _dailyDate)
      .order('score', { ascending: false });

    if (!allScores?.length) { alert(`No scores for this daily challenge yet!`); return; }

    const userIndex = allScores.findIndex(e => e.user_id === loggedInUserId);
    if (userIndex === -1) { alert(`You haven't played today's challenge yet!`); return; }

    // Re-render all rows so the user's row is definitely in the DOM
    leaderboardBody.innerHTML = '';
    userHighlightRow = null;
    allScores.forEach((entry, i) => leaderboardBody.appendChild(buildRow(entry, i)));
    currentOffset = allScores.length;

    setTimeout(() => {
      if (userHighlightRow) {
        userHighlightRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setupToastObserver();
        myRankToast.textContent = `📍 You're #${userIndex + 1} — tap to jump back`;
      }
    }, 100);
  }

  function populateDateDropdown() {
    const today = new Date();
    dateDropdown.innerHTML = '';
    for (let i = 0; i < 30; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dateStr     = d.toISOString().split('T')[0];
      const displayDate = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const opt = document.createElement('option');
      opt.value       = dateStr;
      opt.textContent = i === 0 ? `Today (${displayDate})` : displayDate;
      dateDropdown.appendChild(opt);
    }
    currentDate = dateDropdown.value;
  }

  window.loadLeaderboard = loadLeaderboard;
  window.loadDailyChallengeLeaderboardForDate = loadDailyChallengeLeaderboardForDate;

  Object.defineProperty(window, 'currentMode',     { get: () => currentMode,     set: v => { currentMode = v; } });
  Object.defineProperty(window, 'currentDate',     { get: () => currentDate,     set: v => { currentDate = v; } });
  Object.defineProperty(window, 'currentCategory', { get: () => currentCategory, set: v => { currentCategory = v; } });

  const initTimeout = setTimeout(() => {
    leaderboardBody.innerHTML = '<tr><td colspan="4">Loading is taking longer than expected. Please refresh.</td></tr>';
  }, 5000);

  loadCategories()
    .then(() => clearTimeout(initTimeout))
    .catch(err => {
      clearTimeout(initTimeout);
      leaderboardBody.innerHTML = '<tr><td colspan="4">Failed to load leaderboard. Please refresh the page.</td></tr>';
    });
</script>

<!-- ========================================
     ACCOUNT/PREMIUM BUTTON REMOVAL
======================================== -->
<script type="module">
  import { supabase } from './js/supabase-client.js';
  
  // NON-BLOCKING: Use .then() instead of await
  supabase.auth.getSession()
    .then(async ({ data: { session } }) => {
      if (session?.user) {
        const { data: profile } = await supabase.from('users').select('is_premium').eq('id', session.user.id).single();
        if (profile?.is_premium) document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
      }
      if (!session?.user) document.querySelectorAll('.menu-btn-account').forEach(btn => btn.remove());
    })
    .catch(err => {
      console.error('Premium check failed:', err);
    });
</script>

<!-- ========================================
     DAILY CHALLENGE MENU BUTTON
======================================== -->
<script type="module">
  import { getTodaysDailyChallenge, modeDisplayNames, categoryDisplayNames, categoryEmojis } from './js/daily-challenge.js';
  document.addEventListener('DOMContentLoaded', () => {
    const categorySpan = document.getElementById('dailyChallengeCategory');
    const bg = document.getElementById('dailyChallengeBg');
    const today = getTodaysDailyChallenge();
    if (today && categorySpan && bg) {
      const modeName = modeDisplayNames[today.mode] || today.mode.toUpperCase();
      const categoryName = categoryDisplayNames[today.category] || today.category;
      const emoji = categoryEmojis[today.category] || '';
      categorySpan.textContent = `${modeName}: ${categoryName} ${emoji}`;
      bg.style.backgroundImage = `url('images/categories/${today.category}.jpg')`;
    }
  });
</script>
