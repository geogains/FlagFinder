  <style>
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }
    
    @media (max-width: 768px) {  
      .hero-section {
        margin-top: 85px !important; /* Reduced from 100px for mobile */
      }
    }
    
    @media (max-width: 480px) {
      .hero-section {
        margin-top: 75px !important; /* Reduced gap for small mobile screens */
        padding: 20px 16px 30px !important; /* Reduced top padding for tighter layout */
      }
    }
    
    /* ========================================
       HEADER USERNAME/SIGN-IN TEXT
    ======================================== */
    .sign-in-text {
      font-weight: 600;
      color: #0d315a;
      font-size: 1.1rem;
      cursor: pointer;
      margin-left: 1.2rem;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .sign-in-text:hover {
      opacity: 0.8;
    }
    
    /* ========================================
       HERO SECTION
    ======================================== */
    .hero-section {
      position: relative;
      padding: 80px 20px 40px; /* Reduced top padding from 120px to 80px */
      text-align: center;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      animation: fadeInUp 1s ease-out;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .hero-logo {
      max-width: 500px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 1rem;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #0d315a;
      margin-bottom: 2rem;
      font-weight: 500;
      opacity: 0.85;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========================================
       CATEGORIES CONVEYOR SECTION
    ======================================== */
    .conveyor-section {
      padding: 0 0 60px;
      position: relative;
    }

    /* ── Desktop / Tablet: 2 horizontal rows ── */
    .conveyor-rows-wrapper {
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2vw, 28px);
      padding: clamp(14px, 2vw, 28px) 0;
      /* Fade left + right edges */
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%, black 7%, black 93%, transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0%, black 7%, black 93%, transparent 100%
      );
    }

    .conveyor-row-h {
      overflow-x: hidden;   /* clips horizontal scroll — essential */
      overflow-y: visible;  /* allows card to lift upward on hover without clipping */
      position: relative;
      /* give breathing room above/below for the hover lift (card lifts 8px) */
      padding: 12px 0;
    }

    .conveyor-track-h {
      display: flex;
      gap: clamp(14px, 1.8vw, 28px);
      width: max-content;
      will-change: transform;
    }

    /* Cards inside horizontal track: reset stompIn, fixed width ~3 per viewport */
    .conveyor-track-h .category-item {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
      flex-shrink: 0;
      width: calc(33.5vw - 20px);
      min-width: 240px;
      max-width: 460px;
      transition: transform 0.3s ease;
    }

    /* Row 1 → slides RIGHT */
    @keyframes slide-right {
      from { transform: translateX(-50%); }
      to   { transform: translateX(0); }
    }

    /* Row 2 ← slides LEFT */
    @keyframes slide-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .conveyor-row-h.row-right .conveyor-track-h {
      animation: slide-right 34s linear infinite;
    }

    .conveyor-row-h.row-left .conveyor-track-h {
      animation: slide-left 30s linear infinite;
    }

    /* Hovering anywhere in a row pauses that row's scroll */
    .conveyor-row-h:hover .conveyor-track-h {
      animation-play-state: paused;
    }

    /* ── Mobile (≤480px): 1 vertical column ── */
    .conveyor-col-mobile {
      display: none;
      overflow: hidden;
      /* Fixed viewport-based height showing ~3.5 cards */
      height: min(960px, 85vh);
      padding: 0 16px;
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%, black 8%, black 92%, transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0%, black 8%, black 92%, transparent 100%
      );
    }

    .conveyor-track-v {
      display: flex;
      flex-direction: column;
      gap: 16px;
      will-change: transform;
      animation: slide-down-cat 36s linear infinite;
    }

    @keyframes slide-down-cat {
      from { transform: translateY(0); }
      to   { transform: translateY(-50%); }
    }

    /* Cards inside vertical track */
    .conveyor-track-v .category-item {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
      flex-shrink: 0;
      width: 100%;
    }

    /* ── Mode-selector-open: freeze all conveyors ── */
    .conveyor-section.conveyor-paused .conveyor-track-h,
    .conveyor-section.conveyor-paused .conveyor-track-v {
      animation-play-state: paused !important;
    }

    /* Smooth resume after un-pause */
    .conveyor-track-h,
    .conveyor-track-v {
      transition: animation-play-state 0s;
    }

    /* ── Responsive switch ── */
    @media (max-width: 480px) {
      .conveyor-rows-wrapper { display: none; }
      .conveyor-col-mobile    { display: block; }
    }

    /* Preserve reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      .conveyor-track-h,
      .conveyor-track-v {
        animation: none !important;
      }
    }

    /* Category-item base (used in both contexts) */
    .category-item {
      position: relative;
    }

    .category-card-new {
      position: relative;
      height: 280px;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: #000;
      isolation: isolate;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      mask-image: radial-gradient(white, black);
      transform: translateZ(0);
      will-change: transform;
    }

    .category-card-new::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
    }

    .category-card-new:hover {
      transform: translate3d(0, -8px, 0);
      box-shadow: 0 16px 64px rgba(0,0,0,0.4);
    }

    .category-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      filter: brightness(0.7);
    }

    .category-card-new:hover .category-bg {
      transform: scale(1.1);
      filter: brightness(0.85);
    }

    .category-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgb(255, 255, 255) 0%, rgb(255, 255, 255) 100%);
      mix-blend-mode: multiply;
      transition: opacity 0.4s ease;
    }

    .category-card-new:hover .category-overlay {
      opacity: 0.7;
    }

    .category-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px;
      z-index: 2;
    }

    .category-emoji {
      font-size: 3.5rem;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .category-card-new:hover .category-emoji {
      transform: scale(1.15) rotate(5deg);
    }

    .category-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
    }

    .category-card-new:hover .category-name {
      transform: translateX(8px);
    }

    .category-play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      width: fit-content;
      opacity: 0;
      transform: translateY(10px);
    }

    .category-card-new:hover .category-play-btn {
      opacity: 1;
      transform: translateY(0);
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
    }

    /* ========================================
       VIEW ALL CATEGORIES BUTTON

      text-align: center;

      animation: fadeInButton 0.6s ease-out forwards;
      animation-delay: 1.5s;

    @keyframes fadeInButton {

    .view-all-btn {

      transition: all 0.3s ease;

    .view-all-btn:hover {

    /* ========================================

    /* ========================================

      }

        gap: 10px;
      }

      .icon-row img {
        width: 30px;

  </style>

<script type="module">
  import { supabase } from './js/supabase-client.js';
  import { openModeSelector as originalOpenModeSelector } from './js/mode-selector.js';

  // ── 8 categories (6 free + 2 new) ──────────────────────────────────
  const freeCategories = [
    { category: "population", display: "Population",      emoji: "👥", image: "population.jpg" },
    { category: "gdp",        display: "GDP Per Capita",  emoji: "💵", image: "gdp.jpg" },
    { category: "altitude",   display: "Highest Altitude",emoji: "🏔️", image: "altitude.jpg" },
    { category: "forest",     display: "Forest Cover",    emoji: "🌲", image: "forest.jpg" },
    { category: "olympic",    display: "Olympic Medals",  emoji: "🥇", image: "olympic.jpg" },
    { category: "landmass",   display: "Land Mass",       emoji: "🌍", image: "landmass.jpg" },
    { category: "beer",       display: "Beer Consumption",emoji: "🍺", image: "beer.jpg" },
    { category: "passport",   display: "Passport Power",  emoji: "🛂", image: "passport.jpg" }
  ];

  // Row split: 4 per horizontal row
  const row1Cats = freeCategories.slice(0, 4); // population, gdp, altitude, forest
  const row2Cats = freeCategories.slice(4, 8); // olympic, landmass, beer, passport

  // ── Card HTML factory ───────────────────────────────────────────────
  function cardHTML(cat) {
    return `
      <div class="category-item">
        <div class="category-card-new" onclick="openModeSelector('${cat.category}', '${cat.display}', '${cat.emoji}')">
          <div class="category-bg" style="background-image: url('images/categories/${cat.image}');"></div>
          <div class="category-overlay"></div>
          <div class="category-content">
            <div class="category-emoji">${cat.emoji}</div>
            <div class="category-name">${cat.display}</div>
            <div class="category-play-btn"><span>Play</span><span></span></div>
          </div>
        </div>
      </div>`;
  }

  // Duplicate for seamless loop (Set A + Set B)
  function buildTrack(cats) {
    return [...cats, ...cats].map(cardHTML).join('');
  }

  // ── Render ──────────────────────────────────────────────────────────
  document.getElementById('conveyorTrackRow1').innerHTML   = buildTrack(row1Cats);
  document.getElementById('conveyorTrackRow2').innerHTML   = buildTrack(row2Cats);
  // Mobile: all 8 duplicated
  document.getElementById('conveyorTrackMobile').innerHTML = buildTrack(freeCategories);

  // ── Mode selector scroll + conveyor pause ───────────────────────────
  let modeSelectorScrollPosition = 0;
  const conveyorSection = document.getElementById('conveyorSection');

  function resumeConveyor() {
    document.body.style.top = '';
    window.scrollTo(0, modeSelectorScrollPosition);
    conveyorSection?.classList.remove('conveyor-paused');
  }

  window.openModeSelector = function(category, display, emoji) {
    modeSelectorScrollPosition = window.pageYOffset;
    document.body.style.top = `-${modeSelectorScrollPosition}px`;
    conveyorSection?.classList.add('conveyor-paused');
    window.plausible('category_selected', { props: { category: category } });
    originalOpenModeSelector(category, display, emoji);
  };

  // Strategy 1: custom event fired by mode-selector.js
  window.addEventListener('closeModeSelectorCustom', resumeConveyor);

  // Strategy 2: MutationObserver — watches for the mode selector overlay
  // being hidden or removed from the DOM, regardless of how it closes
  const observer = new MutationObserver(() => {
    // If conveyor is paused but no mode-selector overlay is visible, resume
    if (conveyorSection?.classList.contains('conveyor-paused')) {
      const overlay = document.querySelector('.mode-selector-overlay, [class*="mode-selector"]');
      const isVisible = overlay &&
        !overlay.classList.contains('hidden') &&
        overlay.style.display !== 'none' &&
        overlay.offsetParent !== null;
      if (!isVisible) {
        // Small grace period so any close animation can finish
        setTimeout(resumeConveyor, 250);
      }
    }
  });
  observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class', 'style'] });

  // ── Menu toggle with scroll lock ────────────────────────────────────
  const menuToggle  = document.getElementById('menuToggle');
  const menuOverlay = document.getElementById('menuOverlay');
  const closeMenu   = document.getElementById('closeMenu');
  const menuPanel   = document.querySelector('.menu-panel');
  let scrollPosition = 0;

  menuToggle?.addEventListener('click', () => {
    scrollPosition = window.pageYOffset;
    document.body.classList.add('menu-open');
    document.body.style.top = `-${scrollPosition}px`;
    menuOverlay.classList.add('active');
    if (menuPanel) menuPanel.scrollTop = 0;
  });

  function closeMenuHandler() {
    document.body.classList.remove('menu-open');
    document.body.style.top = '';
    window.scrollTo(0, scrollPosition);
    menuOverlay.classList.remove('active');
  }

  closeMenu?.addEventListener('click', closeMenuHandler);
  menuOverlay?.addEventListener('click', (e) => {
    if (e.target === menuOverlay) closeMenuHandler();
  });
</script>

<!-- Sign-In Text + Menu Button Management (single session fetch) -->
<script type="module">
  import { supabase } from './js/supabase-client.js';

  const signInText = document.getElementById('signInText');
  signInText.textContent = "Loading...";
  signInText.style.opacity = "0.6";

  // Timeout fallback: if auth takes too long, show defaults
  const authTimeout = setTimeout(() => {
    console.warn('⏱️ Auth check timed out - showing default');
    signInText.textContent = "Sign In | Create Account";
    signInText.href = "auth.html";
    signInText.style.opacity = "1";
  }, 3000);

  // NON-BLOCKING: single session fetch — result shared for sign-in text, buttons, and profile
  supabase.auth.getSession()
    .then(async ({ data: { session } }) => {
      clearTimeout(authTimeout);

      if (session?.user) {
        const userMeta = session.user.user_metadata;
        let displayName = userMeta.full_name || userMeta.username;

        // Fetch username and is_premium in one query instead of two separate calls
        try {
          const { data: userData } = await supabase
            .from('users')
            .select('username, is_premium')
            .eq('id', session.user.id)
            .single();

          if (!displayName && userData?.username) {
            displayName = userData.username;
          }
          if (userData?.is_premium) {
            document.querySelectorAll('.upgrade-access-btn').forEach(btn => btn.remove());
          }
        } catch (err) {
          console.log('Could not fetch user profile');
        }

        signInText.textContent = displayName || "Account";
        signInText.href = "account.html";
      } else {
        signInText.textContent = "Sign In | Create Account";
        signInText.href = "auth.html";
        document.querySelectorAll('.menu-btn-account').forEach(btn => btn.remove());
      }
      signInText.style.opacity = "1";
    })
    .catch(err => {
      clearTimeout(authTimeout);
      console.error('Auth check failed:', err);
      signInText.textContent = "Sign In | Create Account";
      signInText.href = "auth.html";
      signInText.style.opacity = "1";
    });
</script>

<!-- Daily Challenge Menu Button -->
<script type="module">
  import { getTodaysDailyChallenge, modeDisplayNames, categoryDisplayNames, categoryEmojis } from './js/daily-challenge.js';
  document.addEventListener('DOMContentLoaded', () => {
    const categorySpan = document.getElementById('dailyChallengeCategory');
    const bg = document.getElementById('dailyChallengeBg');
    const today = getTodaysDailyChallenge();
    if (today && categorySpan && bg) {
      const modeName = modeDisplayNames[today.mode] || today.mode.toUpperCase();
      const categoryName = categoryDisplayNames[today.category] || today.category;
      const emoji = categoryEmojis[today.category] || '';
      categorySpan.textContent = `${modeName}: ${categoryName} ${emoji}`;
      bg.style.backgroundImage = `url('images/categories/${today.category}.jpg')`;
    }
  });
</script>
